<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Ground -->
  <rect x="0" y="110" width="120" height="10" fill="#059669"/>
  
  <!-- Main building -->
  <rect x="20" y="60" width="80" height="50" fill="#FFFFFF"/>
  <rect x="15" y="55" width="90" height="8" fill="#FFFFFF"/>
  
  <!-- Main entrance arch -->
  <path d="M45 110 L45 75 Q60 60 75 75 L75 110 Z" fill="#059669"/>
  <path d="M48 110 L48 78 Q60 65 72 78 L72 110 Z" fill="#FFFFFF"/>
  
  <!-- Side arches -->
  <path d="M25 110 L25 80 Q30 70 35 80 L35 110 Z" fill="#059669"/>
  <path d="M85 110 L85 80 Q90 70 95 80 L95 110 Z" fill="#059669"/>
  
  <!-- Main dome -->
  <ellipse cx="60" cy="50" rx="30" ry="18" fill="#FFFFFF"/>
  <ellipse cx="60" cy="48" rx="22" ry="12" fill="#ECFDF5"/>
  
  <!-- Dome base -->
  <rect x="32" y="50" width="56" height="8" fill="#FFFFFF"/>
  
  <!-- Main dome minaret -->
  <rect x="55" y="20" width="10" height="35" fill="#FFFFFF"/>
  <ellipse cx="60" cy="18" rx="8" ry="4" fill="#FFFFFF"/>
  <circle cx="60" cy="12" r="4" fill="#D4AF37"/>
  
  <!-- Dome top crescent -->
  <path d="M60 2 A4 4 0 1 1 60 10 A3 3 0 1 0 60 2" fill="#059669"/>
  
  <!-- Left minaret -->
  <rect x="8" y="40" width="6" height="70" fill="#FFFFFF"/>
  <ellipse cx="11" cy="38" rx="5" ry="3" fill="#FFFFFF"/>
  <circle cx="11" cy="33" r="2" fill="#D4AF37"/>
  
  <!-- Right minaret -->
  <rect x="106" y="40" width="6" height="70" fill="#FFFFFF"/>
  <ellipse cx="109" cy="38" rx="5" ry="3" fill="#FFFFFF"/>
  <circle cx="109" cy="33" r="2" fill="#D4AF37"/>
  
  <!-- Windows -->
  <circle cx="60" cy="70" r="4" fill="#059669"/>
  <circle cx="42" cy="70" r="3" fill="#059669"/>
  <circle cx="78" cy="70" r="3" fill="#059669"/>
  
  <!-- Decorative lines -->
  <line x1="20" y1="55" x2="100" y2="55" stroke="#D4AF37" stroke-width="1"/>
  <line x1="20" y1="63" x2="100" y2="63" stroke="#D4AF37" stroke-width="0.5"/>
</svg>
